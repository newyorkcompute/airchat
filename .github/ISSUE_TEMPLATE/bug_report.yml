name: Bug report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. If this is about the **hosted demo** at useairchat.vercel.app, note it's rate-limited - try reproducing locally first.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: What did you expect vs what you saw?
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. npm run dev
        2. Ask "..."
        3. Tap ...
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Commit or version (optional)
      placeholder: main @ abc1234

  - type: dropdown
    id: environment
    attributes:
      label: Environment
      options:
        - Local dev
        - useairchat.vercel.app
        - Self-hosted Vercel
        - Other
    validations:
      required: true

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues
          required: true
